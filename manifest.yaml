android:
  gradle: true
  manifest:
    package: io.github.phiresky.wayland_android
    sdk:
      min_sdk_version: 34
      target_sdk_version: 35
    application:
      label: "Wayland Launcher"
      extract_native_libs: true
    uses_permission:
      - name: android.permission.INTERNET
    uses_feature:
      - name: android.hardware.type.pc
        required: false
